<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>Demo</title>
<style>
.demo-cursor{
    text-align:center;
    display:inline-block;
    width:100px;
    height:100px;
    margin:10px;
    border:3px solid black;
}
.demo-cursor:hover{
    background-color:lightgrey;
}
.auto{
    cursor:auto;
}
.alias{
    cursor:alias;
}
.crosshair{
    cursor:crosshair;
}
</style>
</head>
<body>
<h2>CSS Cursor Property</h2>
<h3>Move the mouse over the boxes</h3>
<div class="demo-cursor auto">
<h3>Auto</h3>
</div>
<div class="demo-cursor alias">
<h3>Alias</h3>
</div>
<div class="demo-cursor crosshair">
<h3>Crosshair</h3>
</div>
</body>
</html>
