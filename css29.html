<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>CSS Column</title>
<style>
p{
column-count:3;
column-gap:100px;
column-rule-width:5px;
column-rule-style:double;
column-rule-color:green;
}
</style>
</head>
<body>
<p>
CSS columns allow text to be divided into multiple columns similar to newspapers.
This makes long content easier to read and improves layout design.
You can control column count, spacing, and column rules using CSS properties.
</p>
</body>
</html>
