<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>Demo</title>
<style>
.container{
display:grid;
grid-template-columns:100px 100px 100px;
gap:10px;
}
.itembox{
background-color:lightblue;
padding:20px;
text-align:center;
border:1px solid black;
}
</style>
</head>
<body class="container">
<div class="itembox"><p>One</p></div>
<div class="itembox"><p>Two</p></div>
<div class="itembox"><p>Three</p></div>
</body>
</html>
