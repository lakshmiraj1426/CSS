<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>Demo</title>
<style>
img{
width:30%;
height:auto;
float:left;
margin:10px;
}
.blur{
filter:blur(4px);
}
.brightness{
filter:brightness(0.30);
}
.contrast{
filter:contrast(180%);
}
.grayscale{
filter:grayscale(100%);
}
.huerotate{
filter:hue-rotate(180deg);
}
.invert{
filter:invert(100%);
}
.opacity{
filter:opacity(50%);
}
.saturate{
filter:saturate(7);
}
.sepia{
filter:sepia(100%);
}
.shadow{
filter:drop-shadow(8px 8px 10px green);
}
</style>
</head>
<body>
<h1>CSS Image Filter Property</h1>
<img src="https://upload.wikimedia.org/wikipedia/commons/c/cb/Pineapple_and_cross_section.jpg">
<img class="blur" src="https://upload.wikimedia.org/wikipedia/commons/c/cb/Pineapple_and_cross_section.jpg">
<img class="brightness" src="https://upload.wikimedia.org/wikipedia/commons/c/cb/Pineapple_and_cross_section.jpg">
<img class="contrast" src="https://upload.wikimedia.org/wikipedia/commons/c/cb/Pineapple_and_cross_section.jpg">
<img class="grayscale" src="https://upload.wikimedia.org/wikipedia/commons/c/cb/Pineapple_and_cross_section.jpg">
</body>
</html>
